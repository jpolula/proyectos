<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <title>Menu restaurante</title>
</head>
<body class="bg-gradient-to-br from-[#E0FAF4] via-[#72E8D4] to-[#51B2E0] min-h-screen w-full overflow-x-hidden px-1 sm:px-0">
  <div class="relative w-full max-w-sm sm:max-w-2xl md:max-w-4xl mx-auto mt-0 p-2 sm:p-4 md:p-6 rounded-2xl shadow-lg bg-white/80">
    <div class="flex flex-row items-center justify-between mb-6 md:mb-10 gap-4 md:gap-8 w-full">
      <div class="flex-1 flex justify-center items-center">
        <img src="img/logo-proyecto.png" class="max-w-[240px] sm:max-w-[320px] w-full h-auto" alt="Logo del restaurante">
      </div>
      <div class="flex items-center justify-end">
        <button aria-label="Ver carrito" class="ml-2 flex items-center justify-center bg-white/90 rounded-full p-3 shadow-md border-2 border-[#72B0E8] w-20 h-20 sm:w-24 sm:h-24">
          <span class="material-symbols-outlined text-5xl sm:text-7xl text-[#72B0E8] leading-none">shopping_cart</span>
        </button>
      </div>
    </div>
    <!-- Pestañas de categorías -->
    <div id="categorias" class="flex flex-wrap justify-center gap-2 sm:gap-4 md:gap-6 mb-6"></div>
    <!-- Productos de la categoría seleccionada -->
    <div id="productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
    <div id="subcategorias" class="mb-3 sm:mb-4 flex flex-wrap justify-center gap-1 sm:gap-2"></div>
    <div id="productos" class="space-y-2 sm:space-y-4"></div>
  </div>
  <script src="https://unpkg.com/@themesberg/flowbite@1.1.1/dist/flowbite.bundle.js"></script>
  <script src="menu.js"></script>
</body>
</html>
