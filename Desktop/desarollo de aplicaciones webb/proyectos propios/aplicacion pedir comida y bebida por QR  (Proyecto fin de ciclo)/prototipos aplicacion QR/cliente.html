<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú QR - Cliente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        .header { background: #4A90E2; color: white; padding: 1rem; text-align: center; }
        .mesa { background: #2ECC71; color: white; padding: 0.5rem; position: fixed; top: 1rem; right: 1rem; border-radius: 5px; }
        .menu-container { padding: 1rem; }
        .categoria { background: white; margin: 1rem 0; padding: 1rem; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem; border-bottom: 1px solid #eee; }
        .precio { color: #2ECC71; font-weight: bold; }
        .carrito { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 1rem; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); }
        .btn-pedido { background: #2ECC71; color: white; border: none; padding: 1rem 2rem; width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Menú Digital</h1>
    </div>
    <div class="mesa">Mesa #12</div>
    
    <div class="menu-container">
        <div class="categoria">
            <h2>Bebidas</h2>
            <div class="item">
                <span>Coca-Cola</span>
                <div>
                    <span class="precio">2.50€</span>
                    <button>+</button>
                </div>
            </div>
            <div class="item">
                <span>Cerveza</span>
                <div>
                    <span class="precio">3.00€</span>
                    <button>+</button>
                </div>
            </div>
        </div>

        <div class="categoria">
            <h2>Entrantes</h2>
            <div class="item">
                <span>Patatas Bravas</span>
                <div>
                    <span class="precio">5.50€</span>
                    <button>+</button>
                </div>
            </div>
        </div>

        <div class="categoria">
            <h2>Platos Principales</h2>
            <div class="item">
                <span>Paella</span>
                <div>
                    <span class="precio">15.00€</span>
                    <button>+</button>
                </div>
            </div>
        </div>
    </div>

    <div class="carrito">
        <button class="btn-pedido">Realizar Pedido (3 items - 23.50€)</button>
    </div>
</body>
</html>
