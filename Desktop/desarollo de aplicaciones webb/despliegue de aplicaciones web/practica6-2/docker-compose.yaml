version: '3'
services:
  nginx:
    build: ./nginx/
    container_name: contenedor-nginx
    ports:
      - "80:80"
    links:
      - php
    volumes_from:
      - app-data
  php:
    build: ./php/
    container_name: contenedor-php
    expose:
      - 9000
    links:
      - mysql
    volumes_from:
      - app-data
  app-data:
    image: php:7.0-fpm
    container_name: contenedor-app-data
    volumes:
      - ./www/html/:/var/www/html/
    command: "true"
  mysql:
    image: mysql:5.7
    container_name: contenedor-mysql
    volumes_from:
      - mysql-data
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: mydb
      MYSQL_USER: root
      MYSQL_PASSWORD: ""
  mysql-data:
    image: mysql:5.7
    container_name: contenedor-mysql-data
    volumes:
      - /var/lib/mysql
    command: "true"
      